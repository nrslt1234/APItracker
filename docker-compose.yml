services:
  db:
    image: postgres:16
    container_name: apitracker_postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  api:
    build: .
    container_name: apitracker_fastapi
    env_file:
      - .env

    ports:
      - "8000:8000"

volumes:
  pgdata: